# GB150.1-2024 第4章 压力容器建造通用要求 —— 合规规则
#
# 规则库文件：候选规则，尚未绑定到任何设计类型。

# ─── 规则 1：设计压力范围校核 (GB150.1 1.2) ───
# 钢制容器: 0.1 MPa ≤ p ≤ 35 MPa
- id: GB150.1-1.2.pressure_range
  clause: "1.2"
  severity: error
  applicability:
    type: eq
    value:
      - {attr: material_category}
      - "钢制"
  assertion:
    type: and
    value:
      - type: ge
        value:
          - {param: design_pressure}
          - 0.1
      - type: le
        value:
          - {param: design_pressure}
          - 35.0
  message: "设计压力 {actual} MPa 超出标准适用范围 [0.1, 35] MPa"

# ─── 规则 2：设计温度范围校核 (GB150.1 1.3) ───
# -269°C ≤ T ≤ 900°C
- id: GB150.1-1.3.temperature_range
  clause: "1.3"
  severity: error
  applicability:
    type: exists
    value: {param: design_temperature}
  assertion:
    type: and
    value:
      - type: ge
        value:
          - {param: design_temperature}
          - -269
      - type: le
        value:
          - {param: design_temperature}
          - 900
  message: "设计温度 {actual}°C 超出标准适用范围 [-269, 900]°C"

# ─── 规则 3：容器最小内径校核 (GB150.1 1.4.f) ───
# D_i ≥ 150 mm
- id: GB150.1-1.4.min_diameter
  clause: "1.4 f)"
  severity: error
  applicability:
    type: exists
    value: {param: inner_diameter}
  assertion:
    type: ge
    value:
      - {param: inner_diameter}
      - 150
  message: "容器内径 {actual} mm 小于标准适用最小值 150 mm"

# ─── 规则 4：低温容器判定 (GB150.1 3.1.15) ───
# 设计温度 < -20°C (非合金钢/低合金钢/双相不锈钢)
- id: GB150.1-3.15.low_temp_vessel
  clause: "3.1.15"
  severity: warning
  applicability:
    type: or
    value:
      - type: eq
        value:
          - {attr: material_category}
          - "非合金钢"
      - type: eq
        value:
          - {attr: material_category}
          - "低合金钢"
      - type: eq
        value:
          - {attr: material_category}
          - "双相不锈钢"
  assertion:
    type: when
    cond:
      type: lt
      value:
        - {param: design_temperature}
        - -20
    then:
      type: exists
      value: {attr: low_temp_certified}
  message: "设计温度 {actual}°C < -20°C 的{material_category}容器需提供低温冲击韧性证明"
